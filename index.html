<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xstream - Movie & TV Streaming Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #141b2b 0%, #1a2335 100%);
            color: white;
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: rgba(18, 25, 40, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #4ecdc4;
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #4ecdc4;
            color: #4ecdc4;
        }

        .btn-outline:hover {
            background: #4ecdc4;
            color: white;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            margin-top: 80px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(78,205,196,0.1));
            border-radius: 20px;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #a0a8c0;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        /* Search and Filter */
        .search-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            display: flex;
            gap: 0.5rem;
            min-width: 300px;
        }

        .search-box input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
        }

        .search-box input::placeholder {
            color: #6b7280;
        }

        .filter-box {
            display: flex;
            gap: 0.5rem;
        }

        .filter-box select {
            padding: 0.8rem 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .filter-box select option {
            background: #1a2335;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .content-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .content-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-thumbnail {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .card-info {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            color: #a0a8c0;
            font-size: 0.9rem;
        }

        .card-type {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        /* Auth Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a2335;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal h2 {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a0a8c0;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .modal-footer {
            text-align: center;
            margin-top: 1rem;
            color: #a0a8c0;
        }

        .modal-footer span {
            color: #4ecdc4;
            cursor: pointer;
        }

        /* Watch Page */
        .watch-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: black;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .video-player video {
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        .movie-details {
            margin-bottom: 2rem;
        }

        .movie-details h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .movie-meta {
            display: flex;
            gap: 1rem;
            color: #a0a8c0;
            margin-bottom: 1rem;
        }

        .movie-description {
            line-height: 1.6;
            color: #d1d5db;
        }

        /* Comments Section */
        .comments-section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 2rem;
        }

        .comments-section h3 {
            margin-bottom: 1.5rem;
        }

        .comment-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .comment-form input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .comment {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 0;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: #a0a8c0;
        }

        .comment-username {
            color: #4ecdc4;
            font-weight: 600;
        }

        /* Community Page */
        .create-post {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .create-post h3 {
            margin-bottom: 1rem;
        }

        .create-post input,
        .create-post textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .create-post textarea {
            min-height: 100px;
            resize: vertical;
        }

        .post {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .post-user {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-username {
            color: #4ecdc4;
            font-weight: 600;
        }

        .post-date {
            color: #a0a8c0;
            font-size: 0.9rem;
        }

        .post-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .post-content {
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .post-image {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .post-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .post-actions button {
            background: none;
            border: none;
            color: #a0a8c0;
            cursor: pointer;
            transition: color 0.3s;
        }

        .post-actions button:hover {
            color: #4ecdc4;
        }

        .delete-btn {
            color: #ff6b6b !important;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            min-height: calc(100vh - 80px);
        }

        .admin-sidebar {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .admin-sidebar h3 {
            margin-bottom: 1rem;
            color: #a0a8c0;
        }

        .admin-menu {
            list-style: none;
        }

        .admin-menu li {
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .admin-menu li:hover,
        .admin-menu li.active {
            background: rgba(78, 205, 196, 0.1);
            color: #4ecdc4;
        }

        .admin-content {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 2rem;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #4ecdc4;
        }

        .stat-label {
            color: #a0a8c0;
            margin-top: 0.5rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th,
        .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-table th {
            color: #a0a8c0;
            font-weight: 500;
        }

        .admin-table tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .badge-owner {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
        }

        .badge-user {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
        }

        /* Add Content Form */
        .add-content-form {
            display: grid;
            gap: 1rem;
            max-width: 500px;
        }

        .add-content-form input,
        .add-content-form select,
        .add-content-form textarea {
            padding: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .add-content-form textarea {
            min-height: 100px;
        }

        /* Loading Spinner */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4ecdc4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alerts */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alert-success {
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid #4ecdc4;
            color: #4ecdc4;
        }

        .alert-error {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .search-section {
                flex-direction: column;
            }

            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .admin-dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">Xstream</div>
        <div class="nav-links">
            <a href="#" onclick="showPage('home')">Home</a>
            <a href="#" onclick="showPage('movies')">Movies</a>
            <a href="#" onclick="showPage('tvshows')">TV Shows</a>
            <a href="#" onclick="showPage('community')">Community</a>
            <div class="auth-buttons" id="authButtons">
                <button class="btn btn-outline" onclick="openModal('login')">Login</button>
                <button class="btn btn-primary" onclick="openModal('signup')">Sign Up</button>
            </div>
            <div class="auth-buttons" id="userMenu" style="display: none;">
                <span id="usernameDisplay"></span>
                <button class="btn btn-outline" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <!-- Dynamic content will be loaded here -->
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle">Login</h2>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group" id="signupFields" style="display: none;">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Submit</button>
            </form>
            <div class="modal-footer">
                <span id="modalToggle" onclick="toggleAuthMode()">Don't have an account? Sign up</span>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'https://xtournyb.onrender.com'; // Change this to your Render URL
        let currentUser = null;
        let authToken = null;
        let currentPage = 'home';

        // Check for saved auth
        const savedToken = localStorage.getItem('token');
        const savedUser = localStorage.getItem('user');
        if (savedToken && savedUser) {
            authToken = savedToken;
            currentUser = JSON.parse(savedUser);
            updateAuthUI();
        }

        // Navigation
        function showPage(page) {
            currentPage = page;
            const container = document.getElementById('mainContainer');
            
            if (page === 'home') showHome(container);
            else if (page === 'movies') showMovies(container, 'Movie');
            else if (page === 'tvshows') showMovies(container, 'TV Show');
            else if (page === 'community') showCommunity(container);
            else if (page === 'watch') {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                showWatchPage(container, id);
            }
        }

        // Home Page
        async function showHome(container) {
            container.innerHTML = `
                <div class="hero">
                    <h1>Welcome to Xstream</h1>
                    <p>Stream the latest movies and TV shows. Join our community and share your thoughts.</p>
                    <button class="btn btn-primary" onclick="showPage('movies')">Start Watching</button>
                </div>
                <h2>Trending Now</h2>
                <div class="content-grid" id="trendingGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            `;

            try {
                const response = await fetch(`${API_URL}/movies`);
                const data = await response.json();
                
                const trending = data.movies.slice(0, 6);
                const grid = document.getElementById('trendingGrid');
                
                if (trending.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; color: #a0a8c0;">No content available</p>';
                } else {
                    grid.innerHTML = trending.map(movie => createMovieCard(movie)).join('');
                }
            } catch (error) {
                console.error('Error loading trending:', error);
            }
        }

        // Movies/TV Shows Page
        async function showMovies(container, type) {
            container.innerHTML = `
                <h1>${type === 'Movie' ? 'Movies' : 'TV Shows'}</h1>
                <div class="search-section">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search ${type === 'Movie' ? 'movies' : 'shows'}..." onkeyup="searchContent('${type}')">
                        <button class="btn btn-primary" onclick="searchContent('${type}')">Search</button>
                    </div>
                    <div class="filter-box">
                        <select id="genreFilter" onchange="filterByGenre('${type}')">
                            <option value="all">All Genres</option>
                            <option value="Action">Action</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Drama">Drama</option>
                            <option value="Horror">Horror</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                        </select>
                    </div>
                </div>
                <div class="content-grid" id="contentGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            `;

            await loadContent(type);
        }

        async function loadContent(type, search = '', genre = 'all') {
            try {
                let url = `${API_URL}/movies?type=${type}`;
                if (search) {
                    url = `${API_URL}/movies/search?q=${search}`;
                } else if (genre !== 'all') {
                    url += `&genre=${genre}`;
                }

                const response = await fetch(url);
                const data = await response.json();
                
                const grid = document.getElementById('contentGrid');
                
                if (data.movies.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; color: #a0a8c0;">No content found</p>';
                } else {
                    grid.innerHTML = data.movies.map(movie => createMovieCard(movie)).join('');
                }
            } catch (error) {
                console.error('Error loading content:', error);
            }
        }

        function createMovieCard(movie) {
            return `
                <div class="content-card" onclick="showWatchPage(null, ${movie.id})">
                    <img src="${movie.thumbnail}" class="card-thumbnail" alt="${movie.title}">
                    <div class="card-info">
                        <div class="card-title">${movie.title}</div>
                        <div class="card-meta">
                            <span>${movie.release_year}</span>
                            <span class="card-type">${movie.type}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        async function searchContent(type) {
            const searchInput = document.getElementById('searchInput');
            await loadContent(type, searchInput.value);
        }

        async function filterByGenre(type) {
            const genreFilter = document.getElementById('genreFilter');
            await loadContent(type, '', genreFilter.value);
        }

        // Watch Page
        async function showWatchPage(container, movieId) {
            if (!container) {
                container = document.getElementById('mainContainer');
            }

            try {
                const response = await fetch(`${API_URL}/movies/${movieId}`);
                const data = await response.json();
                const movie = data.movie;
                const comments = data.comments;

                container.innerHTML = `
                    <div class="watch-container">
                        <div class="video-player">
                            <video src="${movie.video_url}" controls autoplay></video>
                        </div>
                        <div class="movie-details">
                            <h1>${movie.title}</h1>
                            <div class="movie-meta">
                                <span>${movie.release_year}</span>
                                <span>${movie.genre}</span>
                                <span>${movie.type}</span>
                            </div>
                            <p class="movie-description">${movie.description}</p>
                        </div>
                        <div class="comments-section">
                            <h3>Comments (${comments.length})</h3>
                            ${currentUser ? `
                                <div class="comment-form">
                                    <input type="text" id="commentInput" placeholder="Add a comment...">
                                    <button class="btn btn-primary" onclick="addComment(${movieId}, null)">Post</button>
                                </div>
                            ` : '<p style="color: #a0a8c0;">Login to comment</p>'}
                            <div id="commentsList">
                                ${comments.map(comment => `
                                    <div class="comment">
                                        <div class="comment-header">
                                            <span class="comment-username">${comment.username}</span>
                                            <span>${new Date(comment.created_at).toLocaleDateString()}</span>
                                        </div>
                                        <p>${comment.content}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading movie:', error);
            }
        }

        // Community Page
        async function showCommunity(container) {
            container.innerHTML = `
                <h1>Community</h1>
                ${currentUser ? `
                    <div class="create-post">
                        <h3>Create Post</h3>
                        <input type="text" id="postTitle" placeholder="Title">
                        <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                        <input type="text" id="postImage" placeholder="Image URL (optional)">
                        <button class="btn btn-primary" onclick="createPost()">Post to Community</button>
                    </div>
                ` : ''}
                <div id="postsContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            `;

            await loadPosts();
        }

        async function loadPosts() {
            try {
                const response = await fetch(`${API_URL}/community/posts`);
                const data = await response.json();
                
                const container = document.getElementById('postsContainer');
                
                if (data.posts.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #a0a8c0;">No posts yet. Be the first to post!</p>';
                } else {
                    container.innerHTML = data.posts.map(post => `
                        <div class="post" id="post-${post.id}">
                            <div class="post-header">
                                <div class="post-user">
                                    <span class="post-username">${post.username}</span>
                                    <span class="post-date">${new Date(post.created_at).toLocaleDateString()}</span>
                                </div>
                                ${currentUser?.role === 'owner' ? `
                                    <button class="delete-btn" onclick="deletePost(${post.id})">Delete</button>
                                ` : ''}
                            </div>
                            <h3 class="post-title">${post.title}</h3>
                            <p class="post-content">${post.content}</p>
                            ${post.image_url ? `<img src="${post.image_url}" class="post-image" alt="Post image">` : ''}
                            <div class="post-actions">
                                <button onclick="showComments(${post.id})">💬 Comments</button>
                                <button onclick="likePost(${post.id})">❤️ Like</button>
                            </div>
                            <div class="comments-section" id="comments-${post.id}" style="display: none; margin-top: 1rem;">
                                ${currentUser ? `
                                    <div class="comment-form">
                                        <input type="text" id="commentInput-${post.id}" placeholder="Add a comment...">
                                        <button class="btn btn-primary" onclick="addComment(null, ${post.id})">Post</button>
                                    </div>
                                ` : ''}
                                <div id="commentsList-${post.id}"></div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading posts:', error);
            }
        }

        async function createPost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const image_url = document.getElementById('postImage').value;

            if (!title || !content) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/community/posts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ title, content, image_url })
                });

                if (response.ok) {
                    showAlert('Post created successfully!', 'success');
                    document.getElementById('postTitle').value = '';
                    document.getElementById('postContent').value = '';
                    document.getElementById('postImage').value = '';
                    await loadPosts();
                } else {
                    showAlert('Failed to create post', 'error');
                }
            } catch (error) {
                console.error('Error creating post:', error);
                showAlert('Error creating post', 'error');
            }
        }

        async function deletePost(postId) {
            if (!confirm('Are you sure you want to delete this post?')) return;

            try {
                const response = await fetch(`${API_URL}/community/posts/${postId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    showAlert('Post deleted successfully', 'success');
                    document.getElementById(`post-${postId}`).remove();
                }
            } catch (error) {
                console.error('Error deleting post:', error);
                showAlert('Error deleting post', 'error');
            }
        }

        function showComments(postId) {
            const commentsSection = document.getElementById(`comments-${postId}`);
            commentsSection.style.display = commentsSection.style.display === 'none' ? 'block' : 'none';
            
            if (commentsSection.style.display === 'block') {
                loadComments(postId);
            }
        }

        async function loadComments(postId) {
            try {
                const response = await fetch(`${API_URL}/community/posts/${postId}`);
                const data = await response.json();
                
                const commentsList = document.getElementById(`commentsList-${postId}`);
                commentsList.innerHTML = data.comments.map(comment => `
                    <div class="comment">
                        <div class="comment-header">
                            <span class="comment-username">${comment.username}</span>
                            <span>${new Date(comment.created_at).toLocaleDateString()}</span>
                        </div>
                        <p>${comment.content}</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        async function addComment(movieId, postId) {
            const inputId = movieId ? 'commentInput' : `commentInput-${postId}`;
            const content = document.getElementById(inputId).value;

            if (!content) {
                showAlert('Please enter a comment', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ content, movie_id: movieId, post_id: postId })
                });

                if (response.ok) {
                    showAlert('Comment added!', 'success');
                    document.getElementById(inputId).value = '';
                    
                    if (movieId) {
                        showWatchPage(null, movieId);
                    } else {
                        loadComments(postId);
                    }
                }
            } catch (error) {
                console.error('Error adding comment:', error);
                showAlert('Error adding comment', 'error');
            }
        }

        // Admin Dashboard
        async function showAdminDashboard() {
            if (!currentUser || currentUser.role !== 'owner') {
                showPage('home');
                return;
            }

            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="admin-dashboard">
                    <div class="admin-sidebar">
                        <h3>Admin Panel</h3>
                        <ul class="admin-menu">
                            <li class="active" onclick="switchAdminTab('dashboard')">Dashboard</li>
                            <li onclick="switchAdminTab('content')">Content Management</li>
                            <li onclick="switchAdminTab('users')">User Management</li>
                            <li onclick="switchAdminTab('logs')">Activity Logs</li>
                            <li onclick="switchAdminTab('add')">Add Content</li>
                        </ul>
                    </div>
                    <div class="admin-content">
                        <div class="admin-section active" id="admin-dashboard">
                            <h2>Dashboard Overview</h2>
                            <div class="admin-stats" id="statsContainer">
                                <div class="loading">
                                    <div class="spinner"></div>
                                </div>
                            </div>
                        </div>
                        <div class="admin-section" id="admin-content">
                            <h2>Content Management</h2>
                            <div id="contentList"></div>
                        </div>
                        <div class="admin-section" id="admin-users">
                            <h2>User Management</h2>
                            <div id="usersList"></div>
                        </div>
                        <div class="admin-section" id="admin-logs">
                            <h2>Activity Logs</h2>
                            <div id="logsList"></div>
                        </div>
                        <div class="admin-section" id="admin-add">
                            <h2>Add New Content</h2>
                            <form class="add-content-form" onsubmit="addContent(event)">
                                <input type="text" id="contentTitle" placeholder="Title" required>
                                <textarea id="contentDescription" placeholder="Description" required></textarea>
                                <input type="text" id="contentGenre" placeholder="Genre (comma separated)" required>
                                <input type="number" id="contentYear" placeholder="Release Year" required>
                                <select id="contentType" required>
                                    <option value="Movie">Movie</option>
                                    <option value="TV Show">TV Show</option>
                                </select>
                                <input type="text" id="contentThumbnail" placeholder="Thumbnail URL" required>
                                <input type="text" id="contentVideo" placeholder="Video URL" required>
                                <button type="submit" class="btn btn-primary">Add Content</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;

            await loadAdminStats();
            await loadContentList();
            await loadUsersList();
            await loadLogs();
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-menu li').forEach(li => li.classList.remove('active'));
            document.querySelectorAll('.admin-section').forEach(section => section.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`admin-${tab}`).classList.add('active');
        }

        async function loadAdminStats() {
            try {
                const response = await fetch(`${API_URL}/admin/stats`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                const stats = await response.json();

                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${stats.movies}</div>
                        <div class="stat-label">Total Movies</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.users}</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.posts}</div>
                        <div class="stat-label">Community Posts</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadContentList() {
            try {
                const response = await fetch(`${API_URL}/movies`);
                const data = await response.json();

                const contentList = document.getElementById('contentList');
                contentList.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Type</th>
                                <th>Year</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.movies.map(movie => `
                                <tr>
                                    <td>${movie.id}</td>
                                    <td>${movie.title}</td>
                                    <td>${movie.type}</td>
                                    <td>${movie.release_year}</td>
                                    <td>
                                        <button class="btn btn-outline" onclick="editContent(${movie.id})">Edit</button>
                                        <button class="btn btn-outline" onclick="deleteContent(${movie.id})">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error loading content:', error);
            }
        }

        async function loadUsersList() {
            try {
                const response = await fetch(`${API_URL}/admin/users`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                const data = await response.json();

                const usersList = document.getElementById('usersList');
                usersList.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.users.map(user => `
                                <tr>
                                    <td>${user.username}</td>
                                    <td>${user.email}</td>
                                    <td>
                                        <span class="badge ${user.role === 'owner' ? 'badge-owner' : 'badge-user'}">
                                            ${user.role}
                                        </span>
                                    </td>
                                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                    <td>
                                        ${user.role !== 'owner' ? `
                                            <button class="btn btn-outline" onclick="banUser('${user.id}')">Ban</button>
                                        ` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        async function loadLogs() {
            try {
                const response = await fetch(`${API_URL}/admin/logs`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                const data = await response.json();

                const logsList = document.getElementById('logsList');
                logsList.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Action</th>
                                <th>User</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.logs.map(log => `
                                <tr>
                                    <td>${log.action}</td>
                                    <td>${log.user}</td>
                                    <td>${new Date(log.timestamp).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error loading logs:', error);
            }
        }

        async function addContent(event) {
            event.preventDefault();

            const content = {
                title: document.getElementById('contentTitle').value,
                description: document.getElementById('contentDescription').value,
                genre: document.getElementById('contentGenre').value,
                release_year: parseInt(document.getElementById('contentYear').value),
                type: document.getElementById('contentType').value,
                thumbnail: document.getElementById('contentThumbnail').value,
                video_url: document.getElementById('contentVideo').value
            };

            try {
                const response = await fetch(`${API_URL}/movies/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(content)
                });

                if (response.ok) {
                    showAlert('Content added successfully!', 'success');
                    event.target.reset();
                    await loadContentList();
                    switchAdminTab('content');
                } else {
                    showAlert('Failed to add content', 'error');
                }
            } catch (error) {
                console.error('Error adding content:', error);
                showAlert('Error adding content', 'error');
            }
        }

        async function deleteContent(contentId) {
            if (!confirm('Are you sure you want to delete this content?')) return;

            try {
                const response = await fetch(`${API_URL}/movies/${contentId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    showAlert('Content deleted successfully', 'success');
                    await loadContentList();
                }
            } catch (error) {
                console.error('Error deleting content:', error);
                showAlert('Error deleting content', 'error');
            }
        }

        async function banUser(userId) {
            if (!confirm('Are you sure you want to ban this user?')) return;

            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}/ban`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    showAlert('User banned successfully', 'success');
                    await loadUsersList();
                }
            } catch (error) {
                console.error('Error banning user:', error);
                showAlert('Error banning user', 'error');
            }
        }

        // Auth Functions
        let authMode = 'login';

        function openModal(mode) {
            authMode = mode;
            const modal = document.getElementById('authModal');
            const modalTitle = document.getElementById('modalTitle');
            const signupFields = document.getElementById('signupFields');
            const modalToggle = document.getElementById('modalToggle');

            if (mode === 'login') {
                modalTitle.textContent = 'Login';
                signupFields.style.display = 'none';
                modalToggle.textContent = "Don't have an account? Sign up";
            } else {
                modalTitle.textContent = 'Sign Up';
                signupFields.style.display = 'block';
                modalToggle.textContent = "Already have an account? Login";
            }

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'signup' : 'login';
            openModal(authMode);
        }

        async function handleAuth(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username')?.value;

            try {
                let response;
                if (authMode === 'login') {
                    response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                } else {
                    response = await fetch(`${API_URL}/auth/signup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, username })
                    });
                }

                const data = await response.json();

                if (response.ok) {
                    if (authMode === 'login') {
                        authToken = data.token;
                        currentUser = data.user;
                        localStorage.setItem('token', authToken);
                        localStorage.setItem('user', JSON.stringify(currentUser));
                        updateAuthUI();
                    }
                    
                    showAlert(authMode === 'login' ? 'Login successful!' : 'Signup successful! Please login', 'success');
                    closeModal();
                    
                    if (authMode === 'signup') {
                        openModal('login');
                    } else {
                        if (currentUser?.role === 'owner') {
                            showAdminDashboard();
                        } else {
                            showPage('home');
                        }
                    }
                } else {
                    showAlert(data.detail || 'Authentication failed', 'error');
                }
            } catch (error) {
                console.error('Auth error:', error);
                showAlert('Connection error', 'error');
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            updateAuthUI();
            showPage('home');
        }

        function updateAuthUI() {
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            const usernameDisplay = document.getElementById('usernameDisplay');

            if (currentUser) {
                authButtons.style.display = 'none';
                userMenu.style.display = 'flex';
                usernameDisplay.textContent = currentUser.username;
                
                // Add admin link if owner
                const navLinks = document.querySelector('.nav-links');
                const existingAdminLink = document.getElementById('adminLink');
                
                if (currentUser.role === 'owner' && !existingAdminLink) {
                    const adminLink = document.createElement('a');
                    adminLink.id = 'adminLink';
                    adminLink.href = '#';
                    adminLink.onclick = () => showAdminDashboard();
                    adminLink.textContent = 'Admin';
                    navLinks.insertBefore(adminLink, navLinks.children[4]);
                } else if (currentUser.role !== 'owner' && existingAdminLink) {
                    existingAdminLink.remove();
                }
            } else {
                authButtons.style.display = 'flex';
                userMenu.style.display = 'none';
                
                const adminLink = document.getElementById('adminLink');
                if (adminLink) adminLink.remove();
            }
        }

        // Utility Functions
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <span>${message}</span>
                <button onclick="this.parentElement.remove()" style="background: none; border: none; color: inherit; cursor: pointer;">&times;</button>
            `;
            
            const container = document.getElementById('mainContainer');
            container.insertBefore(alertDiv, container.firstChild);
            
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.remove();
                }
            }, 5000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            showPage('home');
        });
    </script>
</body>
</html>
