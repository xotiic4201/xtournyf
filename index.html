<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSTREAM</title>
    <style>
        /* Import fonts */
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

        /* RED & BLACK THEME VARIABLES */
        :root {
            --primary: #ff0000;
            --primary-dark: #cc0000;
            --primary-light: #ff3333;
            --secondary: #000000;
            --accent: #ff4444;
            --danger: #ff0000;
            --success: #00ff00;
            --dark: #0a0a0a;
            --darker: #000000;
            --light: #ffffff;
            --gray: #1a1a1a;
            --gray-light: #2a2a2a;
            --gray-dark: #0f0f0f;
            --text: #ffffff;
            --text-muted: #cccccc;
            --gradient: linear-gradient(135deg, #ff0000, #cc0000, #990000);
            --gradient-hover: linear-gradient(135deg, #ff3333, #ff0000, #cc0000);
            --gradient-dark: linear-gradient(135deg, #000000, #1a0000, #330000);
            --shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            --shadow-hover: 0 20px 40px rgba(255, 0, 0, 0.5);
            --shadow-dark: 0 10px 30px rgba(0, 0, 0, 0.8);
            --glass: rgba(255, 0, 0, 0.05);
            --glass-border: rgba(255, 0, 0, 0.2);
            --glass-heavy: rgba(255, 0, 0, 0.1);
        }

        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Epic Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 0, 0, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 0, 0.1) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255, 0, 0, 0.02) 0px, rgba(255, 0, 0, 0.02) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: -1;
            animation: gradientPulse 8s ease-in-out infinite;
        }

        @keyframes gradientPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Blood Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            filter: blur(1px);
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            from {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
            to {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Custom Scrollbar - RED */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 6px;
            border: 2px solid var(--dark);
            transition: all 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #ff3333, #ff0000);
            transform: scale(1.1);
        }

        /* Loading Screen - EPIC */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            font-size: 5rem;
            font-weight: 900;
            font-family: 'Anton', sans-serif;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: loadingPulse 1.5s ease-in-out infinite;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        @keyframes loadingPulse {
            0%, 100% { 
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.5));
            }
            50% { 
                transform: scale(1.1);
                filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.8));
            }
        }

        .loading-bar {
            position: absolute;
            bottom: 100px;
            width: 200px;
            height: 4px;
            background: var(--gray);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            animation: loadingBar 2s ease-in-out infinite;
        }

        @keyframes loadingBar {
            to { left: 100%; }
        }

        /* Navigation - DARK & AGGRESSIVE */
        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--primary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            animation: slideDown 0.5s ease-out;
            box-shadow: 0 4px 30px rgba(255, 0, 0, 0.2);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            font-family: 'Anton', sans-serif;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 3px;
            background: var(--gradient);
            transition: width 0.3s;
            border-radius: 3px;
        }

        .logo:hover::after {
            width: 100%;
        }

        .logo:hover {
            transform: scale(1.05);
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding: 0.5rem 1rem;
            transition: all 0.3s;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 30px;
        }

        .nav-links a i {
            margin-right: 5px;
            font-size: 1rem;
            transition: transform 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
            background: rgba(255, 0, 0, 0.1);
        }

        .nav-links a:hover i {
            transform: translateY(-2px) scale(1.2);
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0%;
            height: 2px;
            background: var(--gradient);
            transform: translateX(-50%);
            transition: width 0.3s;
        }

        .nav-links a:hover::before {
            width: 80%;
        }

        /* Buttons - RED & DEADLY */
        .btn {
            padding: 0.75rem 2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 2px solid transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0%;
            height: 0%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            z-index: -1;
        }

        .btn:hover::before {
            width: 300%;
            height: 300%;
        }

        .btn i {
            font-size: 1rem;
            transition: transform 0.3s;
        }

        .btn:hover i {
            transform: translateX(3px) scale(1.2);
        }

        .btn-primary {
            background: var(--gradient);
            color: var(--text);
            animation: gradientShift 5s ease infinite;
            box-shadow: var(--shadow);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: var(--shadow-hover);
            border-color: var(--text);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--primary);
            transform: translateY(-3px) scale(1.05);
            box-shadow: var(--shadow);
            color: var(--text);
        }

        .btn-glass {
            background: rgba(255, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: var(--text);
        }

        .btn-glass:hover {
            background: rgba(255, 0, 0, 0.2);
            transform: translateY(-3px) scale(1.05);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .btn-danger {
            background: var(--danger);
            color: var(--text);
            border-color: var(--danger);
        }

        .btn-danger:hover {
            background: #ff3333;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.5);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            margin-top: 80px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hero Section - BLOOD RED */
        .hero {
            text-align: center;
            padding: 6rem 2rem;
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2), rgba(0, 0, 0, 0.9));
            border-radius: 40px;
            margin-bottom: 4rem;
            position: relative;
            overflow: hidden;
            animation: heroGlow 4s ease-in-out infinite;
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-hover);
        }

        @keyframes heroGlow {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
                border-color: rgba(255, 0, 0, 0.5);
            }
            50% { 
                box-shadow: 0 0 80px rgba(255, 0, 0, 0.6);
                border-color: var(--primary);
            }
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,0,0,0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero h1 {
            font-size: 5rem;
            margin-bottom: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleFloat 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
            font-family: 'Anton', sans-serif;
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 2rem;
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out 0.3s both;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            z-index: 1;
            position: relative;
        }

        /* Section Titles */
        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
            font-family: 'Anton', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text);
            letter-spacing: 2px;
        }

        .section-title i {
            margin-right: 10px;
            color: var(--primary);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 80px;
            height: 4px;
            background: var(--gradient);
            border-radius: 4px;
            animation: titleLine 3s ease-in-out infinite;
        }

        @keyframes titleLine {
            0%, 100% { width: 80px; }
            50% { width: 150px; }
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        /* Movie Cards - RED THEME */
        .content-card {
            background: var(--gray-dark);
            border: 2px solid var(--primary);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            animation: cardAppear 0.6s ease-out;
            animation-fill-mode: both;
            box-shadow: var(--shadow-dark);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .content-card:nth-child(1) { animation-delay: 0.1s; }
        .content-card:nth-child(2) { animation-delay: 0.15s; }
        .content-card:nth-child(3) { animation-delay: 0.2s; }
        .content-card:nth-child(4) { animation-delay: 0.25s; }
        .content-card:nth-child(5) { animation-delay: 0.3s; }
        .content-card:nth-child(6) { animation-delay: 0.35s; }

        .content-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
        }

        .content-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
            pointer-events: none;
        }

        .content-card:hover::before {
            opacity: 0.2;
        }

        .card-thumbnail {
            width: 100%;
            height: 350px;
            object-fit: cover;
            transition: transform 0.6s;
            border-bottom: 2px solid var(--primary);
        }

        .content-card:hover .card-thumbnail {
            transform: scale(1.1);
        }

        .card-info {
            padding: 1.5rem;
            position: relative;
            z-index: 2;
            background: linear-gradient(to top, var(--dark), transparent);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            transition: color 0.3s;
            color: var(--text);
        }

        .content-card:hover .card-title {
            color: var(--primary);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .card-rating {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: #ff4444;
        }

        .card-rating i {
            font-size: 0.8rem;
        }

        .card-type {
            background: var(--gradient);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            box-shadow: var(--shadow);
        }

        /* Auth Modal - DARK & RED */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: modalFadeIn 0.4s;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                backdrop-filter: blur(0);
            }
            to {
                opacity: 1;
                backdrop-filter: blur(15px);
            }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--dark);
            padding: 3rem;
            border-radius: 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-hover);
            transform: scale(0.9);
            animation: modalContent 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes modalContent {
            to {
                transform: scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--primary);
            color: var(--text);
            transform: rotate(180deg) scale(1.1);
        }

        .modal h2 {
            margin-bottom: 2rem;
            text-align: center;
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Anton', sans-serif;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid var(--gray);
            border-radius: 15px;
            background: var(--gray-dark);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            background: var(--dark);
        }

        .modal-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
        }

        .modal-footer span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
            padding: 0.5rem;
        }

        .modal-footer span:hover {
            color: var(--text);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* Alert Messages */
        .alert {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 1rem 2rem;
            border-radius: 15px;
            background: var(--dark);
            border-left: 5px solid;
            border-right: 2px solid var(--primary);
            border-top: 2px solid var(--primary);
            border-bottom: 2px solid var(--primary);
            color: var(--text);
            z-index: 3000;
            animation: slideInRight 0.3s, pulse 2s infinite;
            box-shadow: var(--shadow);
            font-weight: 600;
        }

        .alert-success {
            border-left-color: #00ff00;
        }

        .alert-error {
            border-left-color: var(--primary);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading Spinner */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid var(--gray);
            border-top-color: var(--primary);
            border-right-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Watch Page */
        .watch-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--darker);
            border-radius: 30px;
            margin-bottom: 2rem;
            overflow: hidden;
            position: relative;
            border: 3px solid var(--primary);
            box-shadow: var(--shadow-hover);
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-details {
            background: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .movie-details h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Anton', sans-serif;
        }

        .movie-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .movie-meta span {
            background: var(--gray-dark);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Comments Section */
        .comments-section {
            background: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .comments-section h3 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .comment-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .comment-form input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 2px solid var(--gray);
            border-radius: 50px;
            background: var(--gray-dark);
            color: var(--text);
            font-size: 1rem;
        }

        .comment-form input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .comment {
            background: var(--gray-dark);
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            animation: commentSlide 0.3s ease-out;
        }

        @keyframes commentSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            color: var(--text-muted);
        }

        .comment-username {
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Community Page */
        .create-post {
            background: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .create-post h3 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .create-post input,
        .create-post textarea {
            width: 100%;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border: 2px solid var(--gray);
            border-radius: 15px;
            background: var(--gray-dark);
            color: var(--text);
            font-size: 1rem;
        }

        .create-post textarea {
            min-height: 120px;
            resize: vertical;
        }

        .create-post input:focus,
        .create-post textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .post {
            background: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .post:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .post-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid var(--text);
        }

        .post-username {
            color: var(--primary);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .post-date {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .post-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text);
            font-weight: 700;
        }

        .post-content {
            margin-bottom: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .post-image {
            max-width: 100%;
            border-radius: 15px;
            margin-bottom: 1rem;
            border: 2px solid var(--primary);
        }

        .post-actions {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--primary);
        }

        .post-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .post-actions button:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        .post-actions button i {
            font-size: 1.2rem;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            min-height: calc(100vh - 100px);
        }

        .admin-sidebar {
            background: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 2rem;
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .admin-sidebar h3 {
            margin-bottom: 1.5rem;
            color: var(--text);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-sidebar h3 i {
            color: var(--primary);
            animation: crownWink 2s infinite;
        }

        @keyframes crownWink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .admin-menu {
            list-style: none;
        }

        .admin-menu li {
            padding: 1rem 1.5rem;
            margin-bottom: 0.5rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .admin-menu li i {
            width: 20px;
            color: var(--text-muted);
        }

        .admin-menu li:hover,
        .admin-menu li.active {
            background: var(--gray-dark);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(10px);
        }

        .admin-menu li:hover i,
        .admin-menu li.active i {
            color: var(--primary);
        }

        .admin-content {
            background: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 2rem;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--gray-dark);
            border: 1px solid var(--primary);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: var(--primary-light);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 2px solid var(--primary);
        }

        .admin-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--gray);
        }

        .admin-table tr {
            transition: all 0.3s;
        }

        .admin-table tr:hover {
            background: var(--gray-dark);
        }

        .badge {
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-owner {
            background: var(--gradient);
            color: var(--text);
        }

        .badge-user {
            background: var(--gray);
            color: var(--text);
        }

        .badge-banned {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .hero h1 {
                font-size: 3rem;
            }
            .admin-dashboard {
                grid-template-columns: 1fr;
            }
            .admin-sidebar {
                position: static;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }
            .btn {
                padding: 0.6rem 1.2rem;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Floating Animation */
        .float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Pulse Animation */
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Ripple Effect */
        .ripple {
            position: relative;
            overflow: hidden;
        }

        .ripple:after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .ripple:hover:after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">XSTREAM</div>
        <div class="loading-bar"></div>
    </div>

    <!-- Blood Particles -->
    <div class="particles" id="particles"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo" onclick="showPage('home')">XSTREAM</div>
        <div class="nav-links">
            <a href="#" onclick="showPage('home')"><i class="fas fa-home"></i> HOME</a>
            <a href="#" onclick="showPage('movies')"><i class="fas fa-film"></i> MOVIES</a>
            <a href="#" onclick="showPage('tvshows')"><i class="fas fa-tv"></i> TV SHOWS</a>
            <a href="#" onclick="showPage('community')"><i class="fas fa-users"></i> COMMUNITY</a>
            <div class="auth-buttons" id="authButtons">
                <button class="btn btn-glass ripple" onclick="openModal('login')">
                    <i class="fas fa-sign-in-alt"></i> LOGIN
                </button>
                <button class="btn btn-primary ripple" onclick="openModal('signup')">
                    <i class="fas fa-user-plus"></i> SIGN UP
                </button>
            </div>
            <div class="auth-buttons" id="userMenu" style="display: none;">
                <span class="btn btn-glass" id="usernameDisplay"></span>
                <button class="btn btn-outline ripple" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> LOGOUT
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <!-- Content loads here -->
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <h2 id="modalTitle">LOGIN</h2>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> USERNAME</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group" id="emailField" style="display: none;">
                    <label><i class="fas fa-envelope"></i> EMAIL</label>
                    <input type="email" id="email" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> PASSWORD</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-paper-plane"></i> SUBMIT
                </button>
            </form>
            <div class="modal-footer">
                <span id="modalToggle" onclick="toggleAuthMode()">Don't have an account? SIGN UP</span>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'https://xtournyb.onrender.com';
        
        let currentUser = null;
        let authToken = null;
        let currentPage = 'home';

        // Create blood particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 15 + 15 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.width = Math.random() * 8 + 2 + 'px';
                particle.style.height = particle.style.width;
                particlesContainer.appendChild(particle);
            }
        }

        // Hide loading screen
        setTimeout(() => {
            document.getElementById('loadingScreen').classList.add('hidden');
        }, 2000);

        createParticles();

        // Check for saved auth
        const savedToken = localStorage.getItem('token');
        const savedUser = localStorage.getItem('user');
        if (savedToken && savedUser) {
            authToken = savedToken;
            currentUser = JSON.parse(savedUser);
            updateAuthUI();
        }

        // Show alert
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                ${message}
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        // Navigation
        function showPage(page) {
            currentPage = page;
            const container = document.getElementById('mainContainer');
            
            container.style.animation = 'none';
            container.offsetHeight;
            container.style.animation = 'fadeIn 0.8s ease-out';
            
            if (page === 'home') showHome(container);
            else if (page === 'movies') showMovies(container, 'Movie');
            else if (page === 'tvshows') showMovies(container, 'TV Show');
            else if (page === 'community') showCommunity(container);
            else if (page === 'admin') showAdminDashboard();
            else if (page === 'watch') {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                showWatchPage(container, id);
            }
        }

        // Home Page
        async function showHome(container) {
            container.innerHTML = `
                <div class="hero">
                    <h1 class="float">WELCOME TO XSTREAM</h1>
                    <p>Experience the future of streaming with our premium collection of movies and TV shows. Join our deadly community today!</p>
                    <div class="hero-buttons">
                        <button class="btn btn-primary pulse" onclick="showPage('movies')">
                            <i class="fas fa-play"></i> START WATCHING
                        </button>
                        <button class="btn btn-glass ripple" onclick="showPage('community')">
                            <i class="fas fa-users"></i> JOIN COMMUNITY
                        </button>
                    </div>
                </div>
                <h2 class="section-title"><i class="fas fa-fire"></i> TRENDING NOW</h2>
                <div class="content-grid" id="trendingGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            `;

            try {
                const response = await fetch(`${API_URL}/movies`);
                const data = await response.json();
                
                const trending = data.movies.slice(0, 6);
                const grid = document.getElementById('trendingGrid');
                
                if (trending.length === 0) {
                    grid.innerHTML = '<p style="text-align: center;">No content available</p>';
                } else {
                    grid.innerHTML = trending.map(movie => createMovieCard(movie)).join('');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Movies Page
        async function showMovies(container, type) {
            container.innerHTML = `
                <h1 class="section-title"><i class="fas fa-${type === 'Movie' ? 'film' : 'tv'}"></i> ${type === 'Movie' ? 'MOVIES' : 'TV SHOWS'}</h1>
                <div class="content-grid" id="contentGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            `;

            try {
                const response = await fetch(`${API_URL}/movies?type=${type}`);
                const data = await response.json();
                
                const grid = document.getElementById('contentGrid');
                
                if (data.movies.length === 0) {
                    grid.innerHTML = '<p style="text-align: center;">No content found</p>';
                } else {
                    grid.innerHTML = data.movies.map(movie => createMovieCard(movie)).join('');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function createMovieCard(movie) {
            const rating = (Math.random() * 2 + 3).toFixed(1);
            return `
                <div class="content-card" onclick="showWatchPage(null, ${movie.id})">
                    <img src="${movie.thumbnail || 'https://via.placeholder.com/300x450?text=NO+IMAGE'}" class="card-thumbnail" alt="${movie.title}">
                    <div class="card-info">
                        <div class="card-title">${movie.title}</div>
                        <div class="card-meta">
                            <span>${movie.release_year}</span>
                            <span class="card-rating"><i class="fas fa-star"></i> ${rating}</span>
                            <span class="card-type">${movie.type}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Watch Page
        async function showWatchPage(container, movieId) {
            if (!container) container = document.getElementById('mainContainer');

            try {
                const response = await fetch(`${API_URL}/movies/${movieId}`);
                const data = await response.json();
                const movie = data.movie;
                const comments = data.comments || [];

                container.innerHTML = `
                    <div class="watch-container">
                        <div class="video-player">
                            <video src="${movie.video_url}" controls autoplay></video>
                        </div>
                        <div class="movie-details">
                            <h1>${movie.title}</h1>
                            <div class="movie-meta">
                                <span><i class="far fa-calendar"></i> ${movie.release_year}</span>
                                <span><i class="fas fa-tag"></i> ${movie.genre}</span>
                                <span><i class="fas fa-film"></i> ${movie.type}</span>
                            </div>
                            <p>${movie.description}</p>
                        </div>
                        <div class="comments-section">
                            <h3><i class="far fa-comments"></i> COMMENTS (${comments.length})</h3>
                            ${currentUser ? `
                                <div class="comment-form">
                                    <input type="text" id="commentInput" placeholder="Add a comment...">
                                    <button class="btn btn-primary" onclick="addComment(${movieId}, null)">
                                        <i class="fas fa-paper-plane"></i> POST
                                    </button>
                                </div>
                            ` : '<p style="color: var(--text-muted);">Login to comment</p>'}
                            <div id="commentsList">
                                ${comments.map(comment => `
                                    <div class="comment">
                                        <div class="comment-header">
                                            <span class="comment-username"><i class="fas fa-user-circle"></i> ${comment.username}</span>
                                            <span>${new Date(comment.created_at).toLocaleDateString()}</span>
                                        </div>
                                        <p>${comment.content}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Community Page
        async function showCommunity(container) {
            container.innerHTML = `
                <h1 class="section-title"><i class="fas fa-users"></i> COMMUNITY</h1>
                ${currentUser ? `
                    <div class="create-post">
                        <h3><i class="fas fa-pen"></i> CREATE POST</h3>
                        <input type="text" id="postTitle" placeholder="Title">
                        <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                        <input type="text" id="postImage" placeholder="Image URL (optional)">
                        <button class="btn btn-primary" onclick="createPost()">
                            <i class="fas fa-paper-plane"></i> POST TO COMMUNITY
                        </button>
                    </div>
                ` : ''}
                <div id="postsContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            `;

            await loadPosts();
        }

        async function loadPosts() {
            try {
                const response = await fetch(`${API_URL}/community/posts`);
                const data = await response.json();
                
                const container = document.getElementById('postsContainer');
                
                if (data.posts.length === 0) {
                    container.innerHTML = '<p style="text-align: center;">No posts yet. Be the first!</p>';
                } else {
                    container.innerHTML = data.posts.map(post => `
                        <div class="post" id="post-${post.id}">
                            <div class="post-header">
                                <div class="post-user">
                                    <div class="post-avatar">${post.username?.charAt(0).toUpperCase()}</div>
                                    <div>
                                        <div class="post-username">${post.username}</div>
                                        <div class="post-date">${new Date(post.created_at).toLocaleDateString()}</div>
                                    </div>
                                </div>
                                ${currentUser?.role === 'owner' ? `
                                    <button class="btn btn-danger" onclick="deletePost(${post.id})">
                                        <i class="fas fa-trash"></i> DELETE
                                    </button>
                                ` : ''}
                            </div>
                            <h3 class="post-title">${post.title}</h3>
                            <p class="post-content">${post.content}</p>
                            ${post.image_url ? `<img src="${post.image_url}" class="post-image">` : ''}
                            <div class="post-actions">
                                <button onclick="showComments(${post.id})">
                                    <i class="far fa-comment"></i> COMMENTS
                                </button>
                                <button onclick="likePost(${post.id})">
                                    <i class="far fa-heart"></i> LIKE
                                </button>
                            </div>
                            <div class="comments-section" id="comments-${post.id}" style="display: none;">
                                ${currentUser ? `
                                    <div class="comment-form">
                                        <input type="text" id="commentInput-${post.id}" placeholder="Add a comment...">
                                        <button class="btn btn-primary" onclick="addComment(null, ${post.id})">
                                            <i class="fas fa-paper-plane"></i> POST
                                        </button>
                                    </div>
                                ` : ''}
                                <div id="commentsList-${post.id}"></div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function createPost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const image_url = document.getElementById('postImage').value;

            if (!title || !content) {
                showAlert('Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/community/posts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ title, content, image_url })
                });

                if (response.ok) {
                    showAlert('Post created!', 'success');
                    document.getElementById('postTitle').value = '';
                    document.getElementById('postContent').value = '';
                    document.getElementById('postImage').value = '';
                    await loadPosts();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function deletePost(postId) {
            if (!confirm('Delete this post?')) return;

            try {
                await fetch(`${API_URL}/community/posts/${postId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                showAlert('Post deleted', 'success');
                document.getElementById(`post-${postId}`).remove();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function showComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
            if (section.style.display === 'block') loadComments(postId);
        }

        async function loadComments(postId) {
            try {
                const response = await fetch(`${API_URL}/community/posts/${postId}`);
                const data = await response.json();
                
                const list = document.getElementById(`commentsList-${postId}`);
                if (data.comments?.length) {
                    list.innerHTML = data.comments.map(c => `
                        <div class="comment">
                            <div class="comment-header">
                                <span class="comment-username"><i class="fas fa-user-circle"></i> ${c.username}</span>
                                <span>${new Date(c.created_at).toLocaleDateString()}</span>
                            </div>
                            <p>${c.content}</p>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p>No comments yet</p>';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function addComment(movieId, postId) {
            const inputId = movieId ? 'commentInput' : `commentInput-${postId}`;
            const content = document.getElementById(inputId).value;

            if (!content) {
                showAlert('Enter a comment', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ content, movie_id: movieId, post_id: postId })
                });

                if (response.ok) {
                    showAlert('Comment added!', 'success');
                    document.getElementById(inputId).value = '';
                    if (movieId) showWatchPage(null, movieId);
                    else loadComments(postId);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function likePost(postId) {
            showAlert('❤️ Thanks for liking!', 'success');
        }

        // Admin Dashboard
        async function showAdminDashboard() {
            if (!currentUser || currentUser.role !== 'owner') {
                showPage('home');
                return;
            }

            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="admin-dashboard">
                    <div class="admin-sidebar">
                        <h3><i class="fas fa-crown"></i> ADMIN PANEL</h3>
                        <ul class="admin-menu">
                            <li class="active" onclick="switchAdminTab('dashboard')">
                                <i class="fas fa-tachometer-alt"></i> DASHBOARD
                            </li>
                            <li onclick="switchAdminTab('users')">
                                <i class="fas fa-users"></i> USERS
                            </li>
                            <li onclick="switchAdminTab('posts')">
                                <i class="fas fa-file-alt"></i> POSTS
                            </li>
                            <li onclick="switchAdminTab('movies')">
                                <i class="fas fa-film"></i> MOVIES
                            </li>
                        </ul>
                    </div>
                    <div class="admin-content">
                        <div class="admin-section active" id="admin-dashboard">
                            <h2>DASHBOARD</h2>
                            <div class="admin-stats" id="statsContainer">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>
                        <div class="admin-section" id="admin-users">
                            <h2>USERS</h2>
                            <div id="usersList"><div class="loading"><div class="spinner"></div></div></div>
                        </div>
                        <div class="admin-section" id="admin-posts">
                            <h2>POSTS</h2>
                            <div id="postsList"><div class="loading"><div class="spinner"></div></div></div>
                        </div>
                        <div class="admin-section" id="admin-movies">
                            <h2>MOVIES</h2>
                            <div id="moviesList"><div class="loading"><div class="spinner"></div></div></div>
                        </div>
                    </div>
                </div>
            `;

            await loadAdminStats();
            await loadAdminUsers();
            await loadAdminPosts();
            await loadAdminMovies();
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-menu li').forEach(li => li.classList.remove('active'));
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            event.target.closest('li').classList.add('active');
            document.getElementById(`admin-${tab}`).classList.add('active');
        }

        async function loadAdminStats() {
            try {
                const response = await fetch(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const stats = await response.json();
                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${stats.movies || 0}</div><div class="stat-label">MOVIES</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.users || 0}</div><div class="stat-label">USERS</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.posts || 0}</div><div class="stat-label">POSTS</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.comments || 0}</div><div class="stat-label">COMMENTS</div></div>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAdminUsers() {
            try {
                const response = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                const list = document.getElementById('usersList');
                if (!data.users?.length) {
                    list.innerHTML = '<p>No users</p>';
                    return;
                }
                list.innerHTML = `
                    <table class="admin-table">
                        <thead><tr><th>USER</th><th>ROLE</th><th>JOINED</th><th>ACTIONS</th></tr></thead>
                        <tbody>
                            ${data.users.map(user => `
                                <tr>
                                    <td><i class="fas fa-user-circle"></i> ${user.username}</td>
                                    <td><span class="badge badge-${user.role}">${user.role}</span></td>
                                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                    <td>
                                        ${user.role !== 'owner' ? `
                                            <button class="btn btn-danger btn-small" onclick="toggleUserStatus('${user.id}')">
                                                <i class="fas fa-ban"></i>
                                            </button>
                                        ` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAdminPosts() {
            try {
                const response = await fetch(`${API_URL}/admin/posts`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                const list = document.getElementById('postsList');
                if (!data.posts?.length) {
                    list.innerHTML = '<p>No posts</p>';
                    return;
                }
                list.innerHTML = `
                    <table class="admin-table">
                        <thead><tr><th>TITLE</th><th>AUTHOR</th><th>DATE</th><th>ACTIONS</th></tr></thead>
                        <tbody>
                            ${data.posts.map(post => `
                                <tr>
                                    <td>${post.title}</td>
                                    <td>${post.username}</td>
                                    <td>${new Date(post.created_at).toLocaleDateString()}</td>
                                    <td>
                                        <button class="btn btn-danger" onclick="adminDeletePost(${post.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAdminMovies() {
            try {
                const response = await fetch(`${API_URL}/movies`);
                const data = await response.json();
                const list = document.getElementById('moviesList');
                if (!data.movies?.length) {
                    list.innerHTML = '<p>No movies</p>';
                    return;
                }
                list.innerHTML = `
                    <table class="admin-table">
                        <thead><tr><th>TITLE</th><th>TYPE</th><th>YEAR</th><th>ACTIONS</th></tr></thead>
                        <tbody>
                            ${data.movies.map(movie => `
                                <tr>
                                    <td>${movie.title}</td>
                                    <td>${movie.type}</td>
                                    <td>${movie.release_year}</td>
                                    <td>
                                        <button class="btn btn-danger" onclick="adminDeleteMovie(${movie.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function toggleUserStatus(userId) {
            try {
                await fetch(`${API_URL}/admin/users/${userId}/toggle-role`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                showAlert('User status updated', 'success');
                loadAdminUsers();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function adminDeletePost(postId) {
            if (!confirm('Delete this post?')) return;
            try {
                await fetch(`${API_URL}/admin/posts/${postId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                showAlert('Post deleted', 'success');
                loadAdminPosts();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function adminDeleteMovie(movieId) {
            if (!confirm('Delete this movie?')) return;
            try {
                await fetch(`${API_URL}/admin/movies/${movieId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                showAlert('Movie deleted', 'success');
                loadAdminMovies();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Auth functions
        function openModal(mode) {
            document.getElementById('authModal').classList.add('active');
            document.getElementById('modalTitle').textContent = mode === 'login' ? 'LOGIN' : 'SIGN UP';
            document.getElementById('emailField').style.display = mode === 'login' ? 'none' : 'block';
            document.getElementById('modalToggle').innerHTML = mode === 'login' 
                ? "Don't have an account? SIGN UP" 
                : "Already have an account? LOGIN";
        }

        function closeModal() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('authForm').reset();
        }

        function toggleAuthMode() {
            const title = document.getElementById('modalTitle');
            const emailField = document.getElementById('emailField');
            const toggle = document.getElementById('modalToggle');

            if (title.textContent === 'LOGIN') {
                title.textContent = 'SIGN UP';
                emailField.style.display = 'block';
                toggle.innerHTML = 'Already have an account? LOGIN';
            } else {
                title.textContent = 'LOGIN';
                emailField.style.display = 'none';
                toggle.innerHTML = "Don't have an account? SIGN UP";
            }
        }

        async function handleAuth(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const isLogin = document.getElementById('modalTitle').textContent === 'LOGIN';

            try {
                const endpoint = isLogin ? '/auth/login' : '/auth/register';
                const body = isLogin ? { username, password } : { username, password, email };

                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        currentUser = data.user;
                        authToken = data.token;
                        localStorage.setItem('user', JSON.stringify(data.user));
                        localStorage.setItem('token', data.token);
                        updateAuthUI();
                        showAlert(`WELCOME BACK, ${username}!`, 'success');
                        closeModal();
                        showPage('home');
                    } else {
                        showAlert('ACCOUNT CREATED! PLEASE LOGIN.', 'success');
                        openModal('login');
                    }
                } else {
                    showAlert(data.detail || 'AUTHENTICATION FAILED', 'error');
                }
            } catch (error) {
                console.error('Auth error:', error);
                showAlert('CONNECTION ERROR', 'error');
            }
        }

        function updateAuthUI() {
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            const usernameDisplay = document.getElementById('usernameDisplay');

            if (currentUser) {
                authButtons.style.display = 'none';
                userMenu.style.display = 'flex';
                usernameDisplay.innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.username}`;
                
                if (currentUser.role === 'owner') {
                    const navLinks = document.querySelector('.nav-links');
                    if (!document.getElementById('adminLink')) {
                        const adminLink = document.createElement('a');
                        adminLink.id = 'adminLink';
                        adminLink.href = '#';
                        adminLink.innerHTML = '<i class="fas fa-crown"></i> ADMIN';
                        adminLink.onclick = () => showPage('admin');
                        navLinks.insertBefore(adminLink, navLinks.children[4]);
                    }
                }
            } else {
                authButtons.style.display = 'flex';
                userMenu.style.display = 'none';
                const adminLink = document.getElementById('adminLink');
                if (adminLink) adminLink.remove();
            }
        }

        function logout() {
            currentUser = null;
            authToken = null;
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            updateAuthUI();
            showAlert('LOGGED OUT', 'success');
            showPage('home');
        }

        // Initialize
        window.onload = () => {
            showPage('home');
        };
    </script>
</body>
</html>
