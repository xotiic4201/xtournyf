                    }
                });

                if (response.ok) {
                    showAlert('Post deleted successfully', 'success');
                    document.getElementById(`post-${postId}`).remove();
                }
            } catch (error) {
                console.error('Error deleting post:', error);
                showAlert('Error deleting post', 'error');
            }
        }

        function showComments(postId) {
            const commentsSection = document.getElementById(`comments-${postId}`);
            commentsSection.style.display = commentsSection.style.display === 'none' ? 'block' : 'none';
            
            if (commentsSection.style.display === 'block') {
                loadComments(postId);
            }
        }

        async function loadComments(postId) {
            try {
                const response = await fetch(`${API_URL}/community/posts/${postId}`);
                const data = await response.json();
                
                const commentsList = document.getElementById(`commentsList-${postId}`);
                if (data.comments && data.comments.length > 0) {
                    commentsList.innerHTML = data.comments.map(comment => `
                        <div class="comment">
                            <div class="comment-header">
                                <span class="comment-username"><i class="fas fa-user-circle"></i> ${comment.username}</span>
                                <span><i class="far fa-clock"></i> ${new Date(comment.created_at).toLocaleDateString()}</span>
                            </div>
                            <p class="comment-content">${comment.content}</p>
                        </div>
                    `).join('');
                } else {
                    commentsList.innerHTML = '<p style="color: var(--light-gray);">No comments yet</p>';
                }
            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        async function addComment(movieId, postId) {
            const inputId = movieId ? 'commentInput' : `commentInput-${postId}`;
            const content = document.getElementById(inputId).value;

            if (!content) {
                showAlert('Please enter a comment', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ content, movie_id: movieId, post_id: postId })
                });

                if (response.ok) {
                    showAlert('Comment added!', 'success');
                    document.getElementById(inputId).value = '';
                    
                    if (movieId) {
                        showWatchPage(null, movieId);
                    } else {
                        loadComments(postId);
                    }
                } else {
                    const data = await response.json();
                    showAlert(data.detail || 'Failed to add comment', 'error');
                }
            } catch (error) {
                console.error('Error adding comment:', error);
                showAlert('Error adding comment', 'error');
            }
        }

        function likePost(postId) {
            showAlert('❤️ Thanks for liking!', 'success');
        }

        // Admin Dashboard
        async function showAdminDashboard() {
            if (!currentUser || currentUser.role !== 'owner') {
                showPage('home');
                return;
            }

            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="admin-dashboard">
                    <div class="admin-sidebar">
                        <h3><i class="fas fa-crown"></i> Admin Panel</h3>
                        <ul class="admin-menu">
                            <li class="active" onclick="switchAdminTab('dashboard')">
                                <i class="fas fa-tachometer-alt"></i> Dashboard
                            </li>
                            <li onclick="switchAdminTab('content')">
                                <i class="fas fa-film"></i> Content Management
                            </li>
                            <li onclick="switchAdminTab('users')">
                                <i class="fas fa-users"></i> User Management
                            </li>
                            <li onclick="switchAdminTab('add')">
                                <i class="fas fa-plus-circle"></i> Add Content
                            </li>
                        </ul>
                    </div>
                    <div class="admin-content">
                        <div class="admin-section active" id="admin-dashboard">
                            <h2>Dashboard Overview</h2>
                            <div class="admin-stats" id="statsContainer">
                                <div class="loading">
                                    <div class="spinner"></div>
                                </div>
                            </div>
                        </div>
                        <div class="admin-section" id="admin-content">
                            <h2>Content Management</h2>
                            <div id="contentList"></div>
                        </div>
                        <div class="admin-section" id="admin-users">
                            <h2>User Management</h2>
                            <div id="usersList"></div>
                        </div>
                        <div class="admin-section" id="admin-add">
                            <h2>Add New Content</h2>
                            <form class="add-content-form" onsubmit="addContent(event)">
                                <input type="text" id="contentTitle" placeholder="Title" required>
                                <textarea id="contentDescription" placeholder="Description" required></textarea>
                                <input type="text" id="contentGenre" placeholder="Genre (comma separated)" required>
                                <input type="number" id="contentYear" placeholder="Release Year" required>
                                <select id="contentType" required>
                                    <option value="Movie">Movie</option>
                                    <option value="TV Show">TV Show</option>
                                </select>
                                <input type="text" id="contentThumbnail" placeholder="Thumbnail URL" required>
                                <input type="text" id="contentVideo" placeholder="Video URL" required>
                                <button type="submit" class="btn btn-primary ripple">
                                    <i class="fas fa-plus"></i> Add Content
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            `;

            await loadAdminStats();
            await loadContentList();
            await loadUsersList();
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-menu li').forEach(li => li.classList.remove('active'));
            document.querySelectorAll('.admin-section').forEach(section => section.classList.remove('active'));
            
            event.target.closest('li').classList.add('active');
            document.getElementById(`admin-${tab}`).classList.add('active');
        }

        async function loadAdminStats() {
            try {
                const response = await fetch(`${API_URL}/admin/stats`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                const stats = await response.json();

                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${stats.movies}</div>
                        <div class="stat-label">Total Movies</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.users}</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.posts}</div>
                        <div class="stat-label">Community Posts</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadContentList() {
            try {
                const response = await fetch(`${API_URL}/movies`);
                const data = await response.json();

                const contentList = document.getElementById('contentList');
                if (data.movies.length === 0) {
                    contentList.innerHTML = '<p style="color: var(--light-gray);">No content available</p>';
                    return;
                }

                contentList.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Type</th>
                                <th>Year</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.movies.map(movie => `
                                <tr>
                                    <td>#${movie.id}</td>
                                    <td>${movie.title}</td>
                                    <td><span class="badge ${movie.type === 'Movie' ? 'badge-owner' : 'badge-user'}">${movie.type}</span></td>
                                    <td>${movie.release_year}</td>
                                    <td>
                                        <button class="btn btn-glass ripple" onclick="editContent(${movie.id})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-glass delete-btn ripple" onclick="deleteContent(${movie.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error loading content:', error);
            }
        }

        async function loadUsersList() {
            try {
                const response = await fetch(`${API_URL}/admin/users`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                const data = await response.json();

                const usersList = document.getElementById('usersList');
                if (data.users.length === 0) {
                    usersList.innerHTML = '<p style="color: var(--light-gray);">No users found</p>';
                    return;
                }

                usersList.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.users.map(user => `
                                <tr>
                                    <td><i class="fas fa-user-circle"></i> ${user.username}</td>
                                    <td>${user.email}</td>
                                    <td>
                                        <span class="badge ${user.role === 'owner' ? 'badge-owner' : user.role === 'banned' ? 'badge-banned' : 'badge-user'}">
                                            ${user.role}
                                        </span>
                                    </td>
                                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                    <td>
                                        ${user.role !== 'owner' ? `
                                            <button class="btn btn-glass ${user.role === 'banned' ? 'btn-success' : 'delete-btn'} ripple" onclick="toggleUserStatus('${user.id}')">
                                                <i class="fas ${user.role === 'banned' ? 'fa-check' : 'fa-ban'}"></i>
                                            </button>
                                        ` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        async function addContent(event) {
            event.preventDefault();

            const title = document.getElementById('contentTitle').value;
            const description = document.getElementById('contentDescription').value;
            const genre = document.getElementById('contentGenre').value;
            const release_year = document.getElementById('contentYear').value;
            const type = document.getElementById('contentType').value;
            const thumbnail = document.getElementById('contentThumbnail').value;
            const video_url = document.getElementById('contentVideo').value;

            try {
                const response = await fetch(`${API_URL}/admin/movies`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        title,
                        description,
                        genre,
                        release_year: parseInt(release_year),
                        type,
                        thumbnail,
                        video_url
                    })
                });

                if (response.ok) {
                    showAlert('Content added successfully!', 'success');
                    document.getElementById('contentTitle').value = '';
                    document.getElementById('contentDescription').value = '';
                    document.getElementById('contentGenre').value = '';
                    document.getElementById('contentYear').value = '';
                    document.getElementById('contentThumbnail').value = '';
                    document.getElementById('contentVideo').value = '';
                    await loadContentList();
                    switchAdminTab('content');
                } else {
                    const data = await response.json();
                    showAlert(data.detail || 'Failed to add content', 'error');
                }
            } catch (error) {
                console.error('Error adding content:', error);
                showAlert('Error adding content', 'error');
            }
        }

        async function deleteContent(contentId) {
            if (!confirm('Are you sure you want to delete this content?')) return;

            try {
                const response = await fetch(`${API_URL}/admin/movies/${contentId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    showAlert('Content deleted successfully', 'success');
                    await loadContentList();
                    await loadAdminStats();
                } else {
                    showAlert('Failed to delete content', 'error');
                }
            } catch (error) {
                console.error('Error deleting content:', error);
                showAlert('Error deleting content', 'error');
            }
        }

        function editContent(contentId) {
            showAlert('Edit functionality coming soon!', 'warning');
        }

        async function toggleUserStatus(userId) {
            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}/toggle`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    showAlert('User status updated', 'success');
                    await loadUsersList();
                }
            } catch (error) {
                console.error('Error toggling user status:', error);
                showAlert('Error updating user status', 'error');
            }
        }

        // Auth functions
        function openModal(mode) {
            const modal = document.getElementById('authModal');
            const modalTitle = document.getElementById('modalTitle');
            const emailField = document.getElementById('emailField');
            const modalToggle = document.getElementById('modalToggle');

            modal.classList.add('active');

            if (mode === 'login') {
                modalTitle.textContent = 'Login';
                emailField.style.display = 'none';
                modalToggle.textContent = "Don't have an account? Sign up";
            } else {
                modalTitle.textContent = 'Sign Up';
                emailField.style.display = 'block';
                modalToggle.textContent = 'Already have an account? Login';
            }
        }

        function closeModal() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('authForm').reset();
        }

        function toggleAuthMode() {
            const modalTitle = document.getElementById('modalTitle');
            const emailField = document.getElementById('emailField');
            const modalToggle = document.getElementById('modalToggle');

            if (modalTitle.textContent === 'Login') {
                modalTitle.textContent = 'Sign Up';
                emailField.style.display = 'block';
                modalToggle.textContent = 'Already have an account? Login';
            } else {
                modalTitle.textContent = 'Login';
                emailField.style.display = 'none';
                modalToggle.textContent = "Don't have an account? Sign up";
            }
        }

        async function handleAuth(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const isLogin = document.getElementById('modalTitle').textContent === 'Login';

            try {
                const endpoint = isLogin ? '/auth/login' : '/auth/register';
                const body = isLogin ? { username, password } : { username, email, password };

                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    updateAuthUI();
                    closeModal();
                    showAlert(`Successfully ${isLogin ? 'logged in' : 'registered'}!`, 'success');
                    showPage('home');
                } else {
                    showAlert(data.detail || 'Authentication failed', 'error');
                }
            } catch (error) {
                console.error('Auth error:', error);
                showAlert('Authentication failed', 'error');
            }
        }

        function updateAuthUI() {
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            const usernameDisplay = document.getElementById('usernameDisplay');

            if (currentUser) {
                authButtons.style.display = 'none';
                userMenu.style.display = 'flex';
                usernameDisplay.innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.username}`;
                
                if (currentUser.role === 'owner') {
                    const navLinks = document.querySelector('.nav-links');
                    if (!document.getElementById('adminLink')) {
                        const adminLink = document.createElement('a');
                        adminLink.id = 'adminLink';
                        adminLink.href = '#';
                        adminLink.innerHTML = '<i class="fas fa-crown"></i> Admin';
                        adminLink.onclick = () => showPage('admin');
                        navLinks.insertBefore(adminLink, navLinks.children[4]);
                    }
                }
            } else {
                authButtons.style.display = 'flex';
                userMenu.style.display = 'none';
                const adminLink = document.getElementById('adminLink');
                if (adminLink) adminLink.remove();
            }
        }

        function logout() {
            currentUser = null;
            authToken = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            updateAuthUI();
            showAlert('Logged out successfully', 'success');
            showPage('home');
        }

        // Initialize
        window.onload = () => {
            showPage('home');
        };
    </script>
</body>
</html>
