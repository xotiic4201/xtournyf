<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSTREAM - PREMIUM STREAMING</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Video.js for professional player -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e50914;
            --primary-dark: #b2070f;
            --primary-light: #ff1f2b;
            --secondary: #000000;
            --accent: #ff4444;
            --dark: #141414;
            --darker: #0a0a0a;
            --light: #ffffff;
            --gray: #2a2a2a;
            --gray-light: #3a3a3a;
            --gray-dark: #1a1a1a;
            --text: #ffffff;
            --text-muted: #b3b3b3;
            --shadow: 0 8px 30px rgba(229, 9, 20, 0.3);
            --shadow-hover: 0 15px 40px rgba(229, 9, 20, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }

        /* Navigation */
        .navbar {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.8) 100%);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
            text-shadow: 0 0 20px var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.95rem;
        }

        .nav-links a i {
            margin-right: 5px;
        }

        .nav-links a:hover {
            color: var(--primary);
            background: rgba(229, 9, 20, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--text);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text);
        }

        .btn-glass:hover {
            background: rgba(229, 9, 20, 0.3);
            border-color: var(--primary);
        }

        .btn-danger {
            background: var(--primary);
            color: var(--text);
        }

        .btn-danger:hover {
            background: var(--primary-dark);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            margin-top: 80px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 5rem 2rem;
            background: linear-gradient(135deg, rgba(229,9,20,0.2) 0%, rgba(0,0,0,0.9) 100%);
            border-radius: 30px;
            margin-bottom: 3rem;
            border: 1px solid var(--primary);
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 3px;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 2rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* Section Titles */
        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
            font-weight: 700;
        }

        .section-title i {
            margin-right: 10px;
            color: var(--primary);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 60px;
            height: 3px;
            background: var(--primary);
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        /* Movie Cards */
        .content-card {
            background: var(--gray-dark);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            border: 1px solid transparent;
        }

        .content-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
        }

        .card-thumbnail {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .content-card:hover .card-thumbnail {
            transform: scale(1.05);
        }

        .card-info {
            padding: 1rem;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .card-rating {
            color: gold;
        }

        .card-type {
            background: var(--primary);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        /* Video Player Page */
        .watch-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 2px solid var(--primary);
        }

        .video-js {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
        }

        .vjs-theme-forest {
            --vjs-theme-forest--primary: var(--primary);
        }

        .movie-details-section {
            background: var(--gray-dark);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .movie-header {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .movie-poster {
            width: 200px;
            border-radius: 10px;
            border: 2px solid var(--primary);
        }

        .movie-info {
            flex: 1;
        }

        .movie-info h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .movie-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .movie-meta span {
            background: var(--gray);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .movie-description {
            color: var(--text-muted);
            line-height: 1.8;
        }

        /* Comments Section */
        .comments-section {
            background: var(--gray-dark);
            border-radius: 15px;
            padding: 2rem;
        }

        .comment-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .comment-form input {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--gray);
            border-radius: 30px;
            background: var(--darker);
            color: var(--text);
        }

        .comment-form input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .comment {
            background: var(--gray);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            color: var(--text-muted);
        }

        .comment-username {
            color: var(--primary);
            font-weight: 600;
        }

        /* Chat Room */
        .chat-container {
            background: var(--gray-dark);
            border-radius: 15px;
            padding: 2rem;
        }

        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 1rem;
            background: var(--darker);
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .chat-message {
            background: var(--gray);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .chat-message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .chat-message-username {
            color: var(--primary);
            font-weight: 600;
        }

        .chat-tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .chat-tag {
            background: var(--primary-dark);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .chat-input {
            display: flex;
            gap: 1rem;
        }

        .chat-input input {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--gray);
            border-radius: 30px;
            background: var(--darker);
            color: var(--text);
        }

        .chat-input input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .tags-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .tag-btn {
            background: var(--gray);
            color: var(--text);
            border: 1px solid var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tag-btn.active {
            background: var(--primary);
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        .admin-sidebar {
            background: var(--gray-dark);
            border-radius: 15px;
            padding: 2rem;
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .admin-menu {
            list-style: none;
        }

        .admin-menu li {
            padding: 1rem 1.5rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-menu li:hover,
        .admin-menu li.active {
            background: var(--primary);
        }

        .admin-content {
            background: var(--gray-dark);
            border-radius: 15px;
            padding: 2rem;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--gray);
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            border-bottom: 2px solid var(--primary);
        }

        .admin-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--gray);
        }

        .admin-table tr:hover {
            background: var(--gray);
        }

        /* Upload Form */
        .upload-form {
            max-width: 600px;
        }

        .upload-form input,
        .upload-form select,
        .upload-form textarea {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid var(--gray);
            border-radius: 10px;
            background: var(--darker);
            color: var(--text);
        }

        .upload-form input:focus,
        .upload-form select:focus,
        .upload-form textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .upload-form input[type="file"] {
            padding: 0.5rem;
            border: 2px dashed var(--primary);
        }

        /* Auth Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--gray-dark);
            padding: 3rem;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            position: relative;
            border: 2px solid var(--primary);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal h2 {
            margin-bottom: 2rem;
            color: var(--primary);
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--gray);
            border-radius: 10px;
            background: var(--darker);
            color: var(--text);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
        }

        .modal-footer span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 1rem 2rem;
            border-radius: 10px;
            background: var(--gray-dark);
            border-left: 5px solid var(--primary);
            color: var(--text);
            z-index: 3000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert-success {
            border-left-color: #00ff00;
        }

        .alert-error {
            border-left-color: var(--primary);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--gray);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 1rem;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
            .movie-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .admin-dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo" onclick="showPage('home')">XSTREAM</div>
        <div class="nav-links">
            <a href="#" onclick="showPage('home')"><i class="fas fa-home"></i> HOME</a>
            <a href="#" onclick="showPage('movies')"><i class="fas fa-film"></i> MOVIES</a>
            <a href="#" onclick="showPage('tvshows')"><i class="fas fa-tv"></i> TV SHOWS</a>
            <a href="#" onclick="showPage('chat')"><i class="fas fa-comments"></i> CHAT</a>
            <div id="authButtons">
                <button class="btn btn-glass" onclick="openModal('login')">
                    <i class="fas fa-sign-in-alt"></i> LOGIN
                </button>
                <button class="btn btn-primary" onclick="openModal('signup')">
                    <i class="fas fa-user-plus"></i> SIGN UP
                </button>
            </div>
            <div id="userMenu" style="display: none;">
                <span class="btn btn-glass" id="usernameDisplay"></span>
                <button class="btn btn-outline" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> LOGOUT
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <!-- Content loaded here -->
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle">LOGIN</h2>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="form-group" id="emailField" style="display: none;">
                    <input type="email" id="email" placeholder="Email">
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">SUBMIT</button>
            </form>
            <div class="modal-footer">
                <span id="modalToggle" onclick="toggleAuthMode()">Don't have an account? SIGN UP</span>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'https://xtournyb.onrender.com';
        
        let currentUser = null;
        let authToken = null;
        let currentPage = 'home';
        let currentPlayer = null;
        let chatInterval = null;
        let selectedTag = null;

        // Check for saved auth
        const savedToken = localStorage.getItem('token');
        const savedUser = localStorage.getItem('user');
        if (savedToken && savedUser) {
            authToken = savedToken;
            currentUser = JSON.parse(savedUser);
            updateAuthUI();
        }

        // Show alert
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        // Navigation
        function showPage(page) {
            currentPage = page;
            const container = document.getElementById('mainContainer');
            
            // Destroy old player if exists
            if (currentPlayer) {
                currentPlayer.dispose();
                currentPlayer = null;
            }
            
            if (page === 'home') showHome(container);
            else if (page === 'movies') showMovies(container, 'Movie');
            else if (page === 'tvshows') showMovies(container, 'TV Show');
            else if (page === 'chat') showChat(container);
            else if (page === 'admin') showAdminDashboard();
            else if (page === 'watch') {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                showWatchPage(container, id);
            }
        }

        // Home Page
        async function showHome(container) {
            container.innerHTML = `
                <div class="hero">
                    <h1>WELCOME TO XSTREAM</h1>
                    <p>Stream the latest movies and TV shows in stunning quality. Join our community today!</p>
                    <div class="hero-buttons">
                        <button class="btn btn-primary" onclick="showPage('movies')">
                            <i class="fas fa-play"></i> START WATCHING
                        </button>
                        <button class="btn btn-glass" onclick="showPage('chat')">
                            <i class="fas fa-comments"></i> JOIN CHAT
                        </button>
                    </div>
                </div>
                <h2 class="section-title"><i class="fas fa-fire"></i> TRENDING NOW</h2>
                <div class="content-grid" id="trendingGrid">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            `;

            try {
                const response = await fetch(`${API_URL}/movies/trending`);
                const data = await response.json();
                
                const grid = document.getElementById('trendingGrid');
                if (!data.movies?.length) {
                    grid.innerHTML = '<p style="text-align: center;">No movies available</p>';
                } else {
                    grid.innerHTML = data.movies.map(movie => createMovieCard(movie)).join('');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Movies Page
        async function showMovies(container, type) {
            container.innerHTML = `
                <h1 class="section-title"><i class="fas fa-${type === 'Movie' ? 'film' : 'tv'}"></i> ${type === 'Movie' ? 'MOVIES' : 'TV SHOWS'}</h1>
                <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <input type="text" id="searchInput" placeholder="Search..." style="flex: 1; padding: 1rem; border: 2px solid var(--primary); border-radius: 30px; background: var(--gray-dark); color: var(--text);">
                    <select id="genreFilter" style="padding: 1rem; border: 2px solid var(--primary); border-radius: 30px; background: var(--gray-dark); color: var(--text);">
                        <option value="all">All Genres</option>
                    </select>
                </div>
                <div class="content-grid" id="contentGrid">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            `;

            // Load genres
            try {
                const genresRes = await fetch(`${API_URL}/movies/genres`);
                const genresData = await genresRes.json();
                const select = document.getElementById('genreFilter');
                genresData.genres?.forEach(genre => {
                    select.innerHTML += `<option value="${genre}">${genre}</option>`;
                });
            } catch (error) {
                console.error('Error loading genres:', error);
            }

            // Event listeners
            document.getElementById('searchInput').addEventListener('input', () => loadContent(type));
            document.getElementById('genreFilter').addEventListener('change', () => loadContent(type));

            await loadContent(type);
        }

        async function loadContent(type) {
            const search = document.getElementById('searchInput')?.value || '';
            const genre = document.getElementById('genreFilter')?.value || 'all';
            
            try {
                let url = search 
                    ? `${API_URL}/movies/search?q=${encodeURIComponent(search)}`
                    : `${API_URL}/movies?type=${type}${genre !== 'all' ? `&genre=${genre}` : ''}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                const grid = document.getElementById('contentGrid');
                const movies = data.movies || [];
                
                grid.innerHTML = movies.length 
                    ? movies.map(movie => createMovieCard(movie)).join('')
                    : '<p style="text-align: center;">No content found</p>';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function createMovieCard(movie) {
            return `
                <div class="content-card" onclick="showWatchPage(null, ${movie.id})">
                    <img src="${movie.thumbnail || 'https://via.placeholder.com/300x450?text=NO+IMAGE'}" class="card-thumbnail" alt="${movie.title}">
                    <div class="card-info">
                        <div class="card-title">${movie.title}</div>
                        <div class="card-meta">
                            <span>${movie.release_year || 'N/A'}</span>
                            <span class="card-rating"><i class="fas fa-star"></i> ${movie.rating || '0'}</span>
                            <span class="card-type">${movie.type || 'Movie'}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Watch Page with Video.js Player
        async function showWatchPage(container, movieId) {
            if (!container) container = document.getElementById('mainContainer');

            try {
                const response = await fetch(`${API_URL}/movies/${movieId}`);
                const data = await response.json();
                const movie = data.movie;
                const comments = data.comments || [];

                container.innerHTML = `
                    <div class="watch-container">
                        <div class="video-wrapper">
                            <video-js id="moviePlayer" class="video-js vjs-theme-forest vjs-big-play-centered" controls preload="auto">
                                <source src="${movie.video_url}" type="video/mp4">
                                <p class="vjs-no-js">Please enable JavaScript</p>
                            </video-js>
                        </div>

                        <div class="movie-header">
                            <img src="${movie.thumbnail || 'https://via.placeholder.com/300x450'}" class="movie-poster" alt="${movie.title}">
                            <div class="movie-info">
                                <h1>${movie.title}</h1>
                                <div class="movie-meta">
                                    <span><i class="far fa-calendar"></i> ${movie.release_year}</span>
                                    <span><i class="fas fa-tag"></i> ${movie.genre}</span>
                                    <span><i class="fas fa-film"></i> ${movie.type}</span>
                                    <span><i class="fas fa-star" style="color: gold;"></i> ${movie.rating || '0'}</span>
                                    <span><i class="fas fa-eye"></i> ${movie.views || 0}</span>
                                </div>
                                <p class="movie-description">${movie.description}</p>
                                ${currentUser ? `
                                    <button class="btn btn-outline" onclick="rateMovie(${movie.id})">
                                        <i class="fas fa-star"></i> RATE
                                    </button>
                                ` : ''}
                            </div>
                        </div>

                        <div class="comments-section">
                            <h3><i class="far fa-comments"></i> COMMENTS (${comments.length})</h3>
                            ${currentUser ? `
                                <div class="comment-form">
                                    <input type="text" id="commentInput" placeholder="Add a comment...">
                                    <button class="btn btn-primary" onclick="addComment(${movie.id})">POST</button>
                                </div>
                            ` : '<p>Login to comment</p>'}
                            <div id="commentsList">
                                ${comments.map(comment => `
                                    <div class="comment">
                                        <div class="comment-header">
                                            <span class="comment-username"><i class="fas fa-user-circle"></i> ${comment.username}</span>
                                            <span>${new Date(comment.created_at).toLocaleDateString()}</span>
                                        </div>
                                        <p>${comment.content}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;

                // Initialize Video.js player
                currentPlayer = videojs('moviePlayer', {
                    fluid: true,
                    playbackRates: [0.5, 1, 1.5, 2],
                    controlBar: {
                        children: [
                            'playToggle',
                            'volumePanel',
                            'currentTimeDisplay',
                            'timeDivider',
                            'durationDisplay',
                            'progressControl',
                            'playbackRateMenuButton',
                            'fullscreenToggle'
                        ]
                    }
                });

                // Track progress
                currentPlayer.on('timeupdate', () => {
                    const progress = Math.floor((currentPlayer.currentTime() / currentPlayer.duration()) * 100);
                    if (currentUser && progress % 10 === 0) { // Update every 10%
                        updateWatchProgress(movie.id, progress);
                    }
                });

            } catch (error) {
                console.error('Error:', error);
                showAlert('Failed to load movie', 'error');
            }
        }

        // Rate Movie
        async function rateMovie(movieId) {
            const rating = prompt('Enter rating (0-10):');
            if (rating && !isNaN(rating) && rating >= 0 && rating <= 10) {
                try {
                    const response = await fetch(`${API_URL}/movies/${movieId}/rate?rating=${rating}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    if (response.ok) {
                        showAlert('Rating added!', 'success');
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            }
        }

        // Update watch progress
        async function updateWatchProgress(movieId, progress) {
            try {
                await fetch(`${API_URL}/user/history/${movieId}?progress=${progress}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
            } catch (error) {
                console.error('Error updating progress:', error);
            }
        }

        // Add comment
        async function addComment(movieId) {
            const content = document.getElementById('commentInput').value;
            if (!content) return;
            
            try {
                const response = await fetch(`${API_URL}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ content, movie_id: movieId })
                });
                
                if (response.ok) {
                    showAlert('Comment added!', 'success');
                    showWatchPage(null, movieId);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Chat Page
        async function showChat(container) {
            container.innerHTML = `
                <h1 class="section-title"><i class="fas fa-comments"></i> GLOBAL CHAT</h1>
                <div class="chat-container">
                    <div class="tags-container" id="tagSelector">
                        <button class="tag-btn" data-tag="general">#general</button>
                        <button class="tag-btn" data-tag="movies">#movies</button>
                        <button class="tag-btn" data-tag="tv">#tv</button>
                        <button class="tag-btn" data-tag="help">#help</button>
                        <button class="tag-btn" data-tag="spoilers">#spoilers</button>
                        <button class="tag-btn" data-tag="random">#random</button>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                    ${currentUser ? `
                        <div class="chat-input">
                            <input type="text" id="chatInput" placeholder="Type your message..." maxlength="500">
                            <button class="btn btn-primary" onclick="sendChatMessage()">SEND</button>
                        </div>
                    ` : '<p style="text-align: center;">Login to chat</p>'}
                </div>
            `;

            // Load messages
            await loadChatMessages();
            
            // Auto refresh
            if (chatInterval) clearInterval(chatInterval);
            chatInterval = setInterval(loadChatMessages, 3000);
            
            // Tag click handlers
            document.querySelectorAll('.tag-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedTag = btn.dataset.tag;
                    loadChatMessages();
                });
            });
        }

        async function loadChatMessages() {
            try {
                let url = `${API_URL}/chat/messages?limit=50`;
                if (selectedTag) url += `&tag=${selectedTag}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                const container = document.getElementById('chatMessages');
                if (!data.messages?.length) {
                    container.innerHTML = '<p style="text-align: center;">No messages</p>';
                    return;
                }
                
                container.innerHTML = data.messages.map(msg => `
                    <div class="chat-message">
                        <div class="chat-message-header">
                            <span class="chat-message-username">
                                <i class="fas fa-user-circle"></i> ${msg.username}
                            </span>
                            <span>${new Date(msg.created_at).toLocaleTimeString()}</span>
                        </div>
                        <div>${msg.content}</div>
                        <div class="chat-tags">
                            ${msg.tags.map(t => `<span class="chat-tag">#${t}</span>`).join('')}
                        </div>
                        ${currentUser?.role === 'owner' ? `
                            <button class="btn btn-danger btn-small" onclick="deleteChatMessage(${msg.id})">DELETE</button>
                        ` : ''}
                    </div>
                `).join('');
                
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content) return;
            
            const tags = [];
            document.querySelectorAll('.tag-btn.active').forEach(btn => {
                tags.push(btn.dataset.tag);
            });
            
            try {
                const response = await fetch(`${API_URL}/chat/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ content, tags })
                });
                
                if (response.ok) {
                    input.value = '';
                    await loadChatMessages();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function deleteChatMessage(messageId) {
            if (!confirm('Delete this message?')) return;
            
            try {
                await fetch(`${API_URL}/chat/messages/${messageId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                showAlert('Message deleted', 'success');
                await loadChatMessages();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Admin Dashboard
        async function showAdminDashboard() {
            if (!currentUser || currentUser.role !== 'owner') {
                showPage('home');
                return;
            }

            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="admin-dashboard">
                    <div class="admin-sidebar">
                        <h3><i class="fas fa-crown" style="color: gold;"></i> ADMIN</h3>
                        <ul class="admin-menu">
                            <li class="active" onclick="switchAdminTab('dashboard')">📊 DASHBOARD</li>
                            <li onclick="switchAdminTab('users')">👥 USERS</li>
                            <li onclick="switchAdminTab('movies')">🎬 MOVIES</li>
                            <li onclick="switchAdminTab('chat')">💬 CHAT</li>
                            <li onclick="switchAdminTab('upload')">📤 UPLOAD</li>
                        </ul>
                    </div>
                    <div class="admin-content">
                        <div class="admin-section active" id="admin-dashboard">
                            <h2>DASHBOARD</h2>
                            <div class="admin-stats" id="statsContainer">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>
                        <div class="admin-section" id="admin-users">
                            <h2>USERS</h2>
                            <div id="usersList"><div class="loading"><div class="spinner"></div></div></div>
                        </div>
                        <div class="admin-section" id="admin-movies">
                            <h2>MOVIES</h2>
                            <div id="moviesList"><div class="loading"><div class="spinner"></div></div></div>
                        </div>
                        <div class="admin-section" id="admin-chat">
                            <h2>CHAT MODERATION</h2>
                            <div id="chatList"><div class="loading"><div class="spinner"></div></div></div>
                        </div>
                        <div class="admin-section" id="admin-upload">
                            <h2>UPLOAD MOVIE</h2>
                            <div class="upload-form">
                                <form id="uploadForm" onsubmit="uploadMovie(event)">
                                    <input type="text" id="movieTitle" placeholder="Title" required>
                                    <textarea id="movieDescription" placeholder="Description" rows="4" required></textarea>
                                    <input type="text" id="movieGenre" placeholder="Genre (comma separated)" required>
                                    <input type="number" id="movieYear" placeholder="Release Year" required>
                                    <select id="movieType" required>
                                        <option value="Movie">Movie</option>
                                        <option value="TV Show">TV Show</option>
                                    </select>
                                    <input type="file" id="movieThumbnail" accept="image/*" required>
                                    <input type="file" id="movieVideo" accept="video/*" required>
                                    <button type="submit" class="btn btn-primary" style="width: 100%;">UPLOAD</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            await loadAdminStats();
            await loadAdminUsers();
            await loadAdminMovies();
            await loadAdminChat();
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-menu li').forEach(li => li.classList.remove('active'));
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`admin-${tab}`).classList.add('active');
        }

        async function loadAdminStats() {
            try {
                const response = await fetch(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const stats = await response.json();
                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${stats.movies || 0}</div><div>MOVIES</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.users || 0}</div><div>USERS</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.messages || 0}</div><div>MESSAGES</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.comments || 0}</div><div>COMMENTS</div></div>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAdminUsers() {
            try {
                const response = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                const list = document.getElementById('usersList');
                
                if (!data.users?.length) {
                    list.innerHTML = '<p>No users</p>';
                    return;
                }
                
                list.innerHTML = `
                    <table class="admin-table">
                        <thead><tr><th>USER</th><th>ROLE</th><th>JOINED</th><th>ACTIONS</th></tr></thead>
                        <tbody>
                            ${data.users.map(user => `
                                <tr>
                                    <td>${user.username}</td>
                                    <td><span style="color: ${user.role === 'owner' ? 'gold' : user.role === 'banned' ? 'red' : 'white'}">${user.role}</span></td>
                                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                    <td>
                                        ${user.role !== 'owner' ? `
                                            <button class="btn btn-danger btn-small" onclick="toggleUserRole('${user.id}')">
                                                ${user.role === 'banned' ? 'UNBAN' : 'BAN'}
                                            </button>
                                        ` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAdminMovies() {
            try {
                const response = await fetch(`${API_URL}/admin/movies`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                const list = document.getElementById('moviesList');
                
                if (!data.movies?.length) {
                    list.innerHTML = '<p>No movies</p>';
                    return;
                }
                
                list.innerHTML = `
                    <table class="admin-table">
                        <thead><tr><th>TITLE</th><th>TYPE</th><th>YEAR</th><th>VIEWS</th><th>ACTIONS</th></tr></thead>
                        <tbody>
                            ${data.movies.map(movie => `
                                <tr>
                                    <td>${movie.title}</td>
                                    <td>${movie.type}</td>
                                    <td>${movie.release_year}</td>
                                    <td>${movie.views || 0}</td>
                                    <td>
                                        <button class="btn btn-danger btn-small" onclick="adminDeleteMovie(${movie.id})">DELETE</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAdminChat() {
            try {
                const response = await fetch(`${API_URL}/admin/chat?limit=100`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                const list = document.getElementById('chatList');
                
                if (!data.messages?.length) {
                    list.innerHTML = '<p>No messages</p>';
                    return;
                }
                
                list.innerHTML = `
                    <table class="admin-table">
                        <thead><tr><th>USER</th><th>MESSAGE</th><th>TIME</th><th>ACTIONS</th></tr></thead>
                        <tbody>
                            ${data.messages.map(msg => `
                                <tr>
                                    <td>${msg.username}</td>
                                    <td>${msg.content}</td>
                                    <td>${new Date(msg.created_at).toLocaleString()}</td>
                                    <td>
                                        <button class="btn btn-danger btn-small" onclick="adminDeleteChatMessage(${msg.id})">DELETE</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function uploadMovie(event) {
            event.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('movieTitle').value);
            formData.append('description', document.getElementById('movieDescription').value);
            formData.append('genre', document.getElementById('movieGenre').value);
            formData.append('release_year', document.getElementById('movieYear').value);
            formData.append('type', document.getElementById('movieType').value);
            formData.append('thumbnail', document.getElementById('movieThumbnail').files[0]);
            formData.append('video', document.getElementById('movieVideo').files[0]);
            
            try {
                const response = await fetch(`${API_URL}/admin/movies/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData
                });
                
                if (response.ok) {
                    showAlert('Movie uploaded!', 'success');
                    document.getElementById('uploadForm').reset();
                    switchAdminTab('movies');
                    await loadAdminMovies();
                } else {
                    const error = await response.json();
                    showAlert(error.detail || 'Upload failed', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Upload failed', 'error');
            }
        }

        async function toggleUserRole(userId) {
            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}/toggle-role`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (response.ok) {
                    showAlert('User role updated', 'success');
                    await loadAdminUsers();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function adminDeleteMovie(movieId) {
            if (!confirm('Delete this movie?')) return;
            
            try {
                const response = await fetch(`${API_URL}/admin/movies/${movieId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (response.ok) {
                    showAlert('Movie deleted', 'success');
                    await loadAdminMovies();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function adminDeleteChatMessage(messageId) {
            if (!confirm('Delete this message?')) return;
            
            try {
                await fetch(`${API_URL}/admin/chat/${messageId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                showAlert('Message deleted', 'success');
                await loadAdminChat();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Auth functions
        function openModal(mode) {
            document.getElementById('authModal').classList.add('active');
            document.getElementById('modalTitle').textContent = mode === 'login' ? 'LOGIN' : 'SIGN UP';
            document.getElementById('emailField').style.display = mode === 'login' ? 'none' : 'block';
            document.getElementById('modalToggle').innerHTML = mode === 'login' 
                ? "Don't have an account? SIGN UP" 
                : "Already have an account? LOGIN";
        }

        function closeModal() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('authForm').reset();
        }

        function toggleAuthMode() {
            const title = document.getElementById('modalTitle');
            const emailField = document.getElementById('emailField');
            const toggle = document.getElementById('modalToggle');

            if (title.textContent === 'LOGIN') {
                title.textContent = 'SIGN UP';
                emailField.style.display = 'block';
                toggle.innerHTML = 'Already have an account? LOGIN';
            } else {
                title.textContent = 'LOGIN';
                emailField.style.display = 'none';
                toggle.innerHTML = "Don't have an account? SIGN UP";
            }
        }

        async function handleAuth(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const isLogin = document.getElementById('modalTitle').textContent === 'LOGIN';

            try {
                const endpoint = isLogin ? '/auth/login' : '/auth/register';
                const body = isLogin ? { username, password } : { username, password, email };

                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        currentUser = data.user;
                        authToken = data.token;
                        localStorage.setItem('user', JSON.stringify(data.user));
                        localStorage.setItem('token', data.token);
                        updateAuthUI();
                        showAlert(`Welcome, ${username}!`, 'success');
                        closeModal();
                        showPage('home');
                    } else {
                        showAlert('Account created! Please login.', 'success');
                        openModal('login');
                    }
                } else {
                    showAlert(data.detail || 'Authentication failed', 'error');
                }
            } catch (error) {
                console.error('Auth error:', error);
                showAlert('Connection error', 'error');
            }
        }

        function updateAuthUI() {
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            const usernameDisplay = document.getElementById('usernameDisplay');

            if (currentUser) {
                authButtons.style.display = 'none';
                userMenu.style.display = 'flex';
                usernameDisplay.innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.username}`;
                
                if (currentUser.role === 'owner' && !document.getElementById('adminLink')) {
                    const adminLink = document.createElement('a');
                    adminLink.id = 'adminLink';
                    adminLink.href = '#';
                    adminLink.innerHTML = '<i class="fas fa-crown"></i> ADMIN';
                    adminLink.onclick = () => showPage('admin');
                    document.querySelector('.nav-links').insertBefore(adminLink, document.querySelector('.nav-links').children[4]);
                }
            } else {
                authButtons.style.display = 'flex';
                userMenu.style.display = 'none';
                document.getElementById('adminLink')?.remove();
            }
        }

        function logout() {
            currentUser = null;
            authToken = null;
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            updateAuthUI();
            showAlert('Logged out', 'success');
            showPage('home');
            
            if (chatInterval) {
                clearInterval(chatInterval);
                chatInterval = null;
            }
        }

        // Initialize
        window.onload = () => showPage('home');
    </script>
</body>
</html>
